name: Deploy to Cloudflare Workers

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Prepare deploy directory
        run: |
          mkdir -p _site
          cp *.html *.js *.json *.svg *.txt *.xml _headers CNAME _site/ 2>/dev/null || true
          ls -la _site/

      - name: Deploy to Cloudflare Workers
        run: npx wrangler deploy --no-bundle
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: 338ad20964d854c4020bcaf8a067569b
