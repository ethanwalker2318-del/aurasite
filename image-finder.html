<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aura — Image Finder Tool</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0a0a0a; color: #e0e0e0; min-height: 100vh; }
  
  .header { background: #111; border-bottom: 1px solid #222; padding: 16px 24px; display: flex; align-items: center; justify-content: space-between; }
  .header h1 { font-size: 18px; color: #c9a55a; }
  .header .stats { font-size: 13px; color: #888; }
  .header .stats b { color: #4ecdc4; }
  
  .main { display: flex; height: calc(100vh - 56px); }
  
  .sidebar { width: 320px; background: #111; border-right: 1px solid #222; overflow-y: auto; flex-shrink: 0; }
  .sidebar .filter-bar { padding: 12px; border-bottom: 1px solid #222; display: flex; gap: 8px; }
  .sidebar .filter-bar select, .sidebar .filter-bar input { background: #1a1a1a; border: 1px solid #333; color: #e0e0e0; padding: 6px 8px; border-radius: 4px; font-size: 12px; }
  .sidebar .filter-bar select { width: 120px; }
  .sidebar .filter-bar input { flex: 1; }
  
  .product-list { padding: 4px; }
  .product-item { padding: 10px 12px; border-bottom: 1px solid #1a1a1a; cursor: pointer; transition: background 0.15s; display: flex; gap: 10px; align-items: center; }
  .product-item:hover { background: #1a1a1a; }
  .product-item.active { background: #1a2a1a; border-left: 3px solid #4ecdc4; }
  .product-item.done { opacity: 0.5; }
  .product-item .thumb { width: 40px; height: 40px; border-radius: 4px; background: #222; display: flex; align-items: center; justify-content: center; font-size: 10px; color: #666; overflow: hidden; flex-shrink: 0; }
  .product-item .thumb img { width: 100%; height: 100%; object-fit: cover; }
  .product-item .info { flex: 1; min-width: 0; }
  .product-item .info .name { font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .product-item .info .brand { font-size: 11px; color: #888; }
  .product-item .status { font-size: 10px; padding: 2px 6px; border-radius: 3px; white-space: nowrap; }
  .product-item .status.ok { background: #1a3a1a; color: #4ecdc4; }
  .product-item .status.need { background: #3a1a1a; color: #ff6b6b; }
  
  .editor { flex: 1; padding: 24px; overflow-y: auto; }
  .editor h2 { font-size: 22px; margin-bottom: 4px; }
  .editor .brand-label { color: #c9a55a; font-size: 14px; margin-bottom: 16px; }
  .editor .pid { color: #666; font-size: 12px; }
  
  .search-row { display: flex; gap: 8px; margin: 16px 0; }
  .search-row .btn { padding: 10px 20px; border: none; border-radius: 6px; cursor: pointer; font-size: 14px; font-weight: 600; transition: all 0.15s; }
  .btn-google { background: #4285f4; color: white; }
  .btn-google:hover { background: #3367d6; }
  .btn-bing { background: #00809d; color: white; }
  .btn-bing:hover { background: #006880; }
  .btn-brand { background: #c9a55a; color: #111; }
  .btn-brand:hover { background: #b8944a; }
  
  .photo-slots { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin: 20px 0; }
  .photo-slot { background: #1a1a1a; border: 2px dashed #333; border-radius: 8px; aspect-ratio: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; overflow: hidden; transition: border-color 0.15s; }
  .photo-slot:hover { border-color: #555; }
  .photo-slot.has-img { border-style: solid; border-color: #4ecdc4; }
  .photo-slot .label { font-size: 11px; color: #666; margin-bottom: 8px; }
  .photo-slot .label.main { color: #c9a55a; font-weight: bold; }
  .photo-slot input { width: 90%; padding: 6px; background: #222; border: 1px solid #333; color: #e0e0e0; border-radius: 4px; font-size: 11px; text-align: center; }
  .photo-slot .preview { width: 100%; height: 100%; object-fit: contain; position: absolute; top: 0; left: 0; }
  .photo-slot .remove { position: absolute; top: 4px; right: 4px; background: rgba(255,0,0,0.8); color: white; border: none; border-radius: 50%; width: 20px; height: 20px; cursor: pointer; font-size: 12px; display: none; }
  .photo-slot.has-img .remove { display: block; }
  .photo-slot .paste-hint { font-size: 10px; color: #555; margin-top: 4px; }
  
  .nav-buttons { display: flex; gap: 12px; margin-top: 20px; }
  .nav-buttons .btn { padding: 12px 24px; border-radius: 6px; border: none; cursor: pointer; font-size: 14px; font-weight: 600; }
  .btn-prev { background: #333; color: #e0e0e0; }
  .btn-next { background: #4ecdc4; color: #111; }
  .btn-skip { background: #333; color: #888; }
  .btn-save { background: #c9a55a; color: #111; }
  
  .export-section { margin-top: 24px; padding-top: 16px; border-top: 1px solid #222; }
  .export-section .btn { margin-right: 8px; }
  .btn-export { background: #27ae60; color: white; padding: 12px 24px; border: none; border-radius: 6px; cursor: pointer; font-size: 14px; font-weight: 600; }
  .btn-export:hover { background: #219a52; }
  
  .progress-bar { height: 4px; background: #222; border-radius: 2px; margin-top: 8px; }
  .progress-bar .fill { height: 100%; background: linear-gradient(90deg, #c9a55a, #4ecdc4); border-radius: 2px; transition: width 0.3s; }
  
  .empty-state { display: flex; align-items: center; justify-content: center; height: 100%; color: #444; font-size: 16px; }
</style>
</head>
<body>

<div class="header">
  <h1>AURA — Image Finder Tool</h1>
  <div class="stats">
    Всего: <b id="stat-total">0</b> &nbsp;|&nbsp; 
    Нужно фото: <b id="stat-need" style="color:#ff6b6b">0</b> &nbsp;|&nbsp; 
    Готово: <b id="stat-done">0</b>
    <div class="progress-bar"><div class="fill" id="progress-fill" style="width:0%"></div></div>
  </div>
</div>

<div class="main">
  <div class="sidebar">
    <div class="filter-bar">
      <select id="filter-brand"><option value="">Все бренды</option></select>
      <input id="filter-search" placeholder="Поиск..." />
    </div>
    <div class="product-list" id="product-list"></div>
  </div>
  
  <div class="editor" id="editor">
    <div class="empty-state">← Выберите товар из списка</div>
  </div>
</div>

<script>
// Load CSV data
let products = [];
let currentIdx = -1;

// Parse CSV from textarea or file input
function parseCSV(text) {
  const lines = text.split('\n').filter(l => l.trim());
  const result = [];
  for (let i = 1; i < lines.length; i++) {
    const line = lines[i];
    // Parse CSV respecting quotes
    const fields = [];
    let field = '', inQuote = false;
    for (let c = 0; c < line.length; c++) {
      const ch = line[c];
      if (ch === '"') {
        if (inQuote && line[c+1] === '"') { field += '"'; c++; }
        else inQuote = !inQuote;
      } else if (ch === ',' && !inQuote) {
        fields.push(field); field = '';
      } else {
        field += ch;
      }
    }
    fields.push(field);
    
    if (fields.length >= 4) {
      result.push({
        id: fields[0],
        brand: fields[1],
        name: fields[2],
        status: fields[3],
        photos: [fields[4]||'', fields[5]||'', fields[6]||'', fields[7]||'', fields[8]||'', fields[9]||'']
      });
    }
  }
  return result;
}

function getBrands() {
  const brands = new Set();
  products.forEach(p => brands.add(p.brand));
  return [...brands].sort();
}

function renderList() {
  const brandFilter = document.getElementById('filter-brand').value;
  const searchFilter = document.getElementById('filter-search').value.toLowerCase();
  const list = document.getElementById('product-list');
  
  const filtered = products.filter(p => {
    if (brandFilter && p.brand !== brandFilter) return false;
    if (searchFilter && !p.name.toLowerCase().includes(searchFilter) && !p.brand.toLowerCase().includes(searchFilter)) return false;
    return true;
  });
  
  // Sort: needs photo first
  filtered.sort((a, b) => {
    const aNeed = a.status === 'НУЖНО ФОТО' ? 0 : 1;
    const bNeed = b.status === 'НУЖНО ФОТО' ? 0 : 1;
    if (aNeed !== bNeed) return aNeed - bNeed;
    return a.brand.localeCompare(b.brand) || a.name.localeCompare(b.name);
  });
  
  list.innerHTML = filtered.map((p, i) => {
    const realIdx = products.indexOf(p);
    const hasImg = p.photos[0] && p.photos[0].startsWith('http');
    const isDone = p.status === 'OK' && hasImg;
    return `<div class="product-item ${realIdx === currentIdx ? 'active' : ''} ${isDone ? 'done' : ''}" onclick="selectProduct(${realIdx})">
      <div class="thumb">${hasImg ? `<img src="${p.photos[0]}" onerror="this.parentNode.textContent='?'">` : '?'}</div>
      <div class="info">
        <div class="name">${p.name}</div>
        <div class="brand">${p.brand} · ${p.id}</div>
      </div>
      <div class="status ${p.status === 'OK' ? 'ok' : 'need'}">${p.status === 'OK' ? '✓' : '!'}</div>
    </div>`;
  }).join('');
  
  // Stats
  const total = products.length;
  const need = products.filter(p => p.status === 'НУЖНО ФОТО' || !p.photos[0]).length;
  const done = total - need;
  document.getElementById('stat-total').textContent = total;
  document.getElementById('stat-need').textContent = need;
  document.getElementById('stat-done').textContent = done;
  document.getElementById('progress-fill').style.width = (done / total * 100) + '%';
}

function selectProduct(idx) {
  currentIdx = idx;
  const p = products[idx];
  const editor = document.getElementById('editor');
  
  const searchQuery = encodeURIComponent(`${p.brand} ${p.name} product photo white background`);
  const googleUrl = `https://www.google.com/search?tbm=isch&q=${searchQuery}`;
  const bingUrl = `https://www.bing.com/images/search?q=${searchQuery}`;
  
  // Brand-specific search URLs
  const brandSearches = {
    'Apple': `https://www.google.com/search?tbm=isch&q=${encodeURIComponent(p.name + ' apple.com product photo')}`,
    'Nike': `https://www.google.com/search?tbm=isch&q=${encodeURIComponent(p.name + ' nike.com product photo')}`,
    'Adidas': `https://www.google.com/search?tbm=isch&q=${encodeURIComponent(p.name + ' adidas.de product photo')}`,
    'Samsung': `https://www.google.com/search?tbm=isch&q=${encodeURIComponent(p.name + ' samsung.com product photo')}`,
    'Sony': `https://www.google.com/search?tbm=isch&q=${encodeURIComponent(p.name + ' sony.de product photo official')}`,
    'Dyson': `https://www.google.com/search?tbm=isch&q=${encodeURIComponent(p.name + ' dyson.de product photo official')}`,
  };
  
  editor.innerHTML = `
    <div class="pid">${p.id}</div>
    <h2>${p.name}</h2>
    <div class="brand-label">${p.brand}</div>
    
    <div class="search-row">
      <a href="${googleUrl}" target="_blank" class="btn btn-google">🔍 Google Images</a>
      <a href="${bingUrl}" target="_blank" class="btn btn-bing">🔍 Bing Images</a>
      ${brandSearches[p.brand] ? `<a href="${brandSearches[p.brand]}" target="_blank" class="btn btn-brand">🏷 ${p.brand} Official</a>` : ''}
    </div>
    
    <p style="color:#888; font-size:12px; margin-bottom:8px;">
      Открой Google Images → ПКМ на фото → "Копировать адрес изображения" → Вставь ниже
    </p>
    
    <div class="photo-slots">
      ${[0,1,2,3,4,5].map(i => `
        <div class="photo-slot ${p.photos[i] ? 'has-img' : ''}" id="slot-${i}">
          <span class="label ${i===0?'main':''}">${i===0?'★ ГЛАВНОЕ':'Фото '+(i+1)}</span>
          <input type="text" placeholder="Вставь URL фото" value="${p.photos[i]||''}" 
                 oninput="updatePhoto(${idx}, ${i}, this.value)" 
                 onpaste="setTimeout(()=>updatePhoto(${idx}, ${i}, this.value), 50)">
          <span class="paste-hint">Ctrl+V</span>
          ${p.photos[i] ? `<img class="preview" src="${p.photos[i]}" onerror="this.style.display='none'">` : ''}
          <button class="remove" onclick="clearPhoto(${idx}, ${i})">×</button>
        </div>
      `).join('')}
    </div>
    
    <div class="nav-buttons">
      <button class="btn btn-prev" onclick="navigate(-1)">← Назад</button>
      <button class="btn btn-skip" onclick="navigate(1)">Пропустить →</button>
      <button class="btn btn-next" onclick="saveAndNext()">✓ Сохранить & Далее</button>
    </div>
    
    <div class="export-section">
      <button class="btn-export" onclick="exportCSV()">📥 Экспорт CSV</button>
      <button class="btn-export" style="background:#3498db" onclick="exportJSON()">📥 Экспорт JSON (для import-images.js)</button>
      <span style="color:#666; font-size:12px; margin-left:8px;">Сохраняет все изменения</span>
    </div>
  `;
  
  renderList();
}

function updatePhoto(idx, slotIdx, url) {
  products[idx].photos[slotIdx] = url.trim();
  if (slotIdx === 0 && url.trim()) {
    products[idx].status = 'OK';
  }
  
  const slot = document.getElementById('slot-' + slotIdx);
  if (url.trim()) {
    slot.classList.add('has-img');
    let preview = slot.querySelector('.preview');
    if (!preview) {
      preview = document.createElement('img');
      preview.className = 'preview';
      preview.onerror = () => preview.style.display = 'none';
      slot.appendChild(preview);
    }
    preview.src = url.trim();
    preview.style.display = '';
  } else {
    slot.classList.remove('has-img');
    const preview = slot.querySelector('.preview');
    if (preview) preview.style.display = 'none';
  }
  
  renderList();
}

function clearPhoto(idx, slotIdx) {
  products[idx].photos[slotIdx] = '';
  if (slotIdx === 0) {
    const hasAny = products[idx].photos.some(u => u);
    if (!hasAny) products[idx].status = 'НУЖНО ФОТО';
  }
  selectProduct(idx);
}

function navigate(dir) {
  let next = currentIdx + dir;
  if (next < 0) next = products.length - 1;
  if (next >= products.length) next = 0;
  selectProduct(next);
}

function saveAndNext() {
  // Find next product that needs photo
  for (let i = 1; i <= products.length; i++) {
    const idx = (currentIdx + i) % products.length;
    if (products[idx].status === 'НУЖНО ФОТО' || !products[idx].photos[0]) {
      selectProduct(idx);
      return;
    }
  }
  alert('Все товары имеют фото! 🎉');
}

function escapeCSV(str) {
  if (str.includes(',') || str.includes('"') || str.includes('\n')) {
    return '"' + str.replace(/"/g, '""') + '"';
  }
  return str;
}

function exportCSV() {
  let csv = 'id,brand,name,status,photo_1 (ГЛАВНОЕ),photo_2,photo_3,photo_4,photo_5,photo_6\n';
  for (const p of products) {
    csv += [p.id, p.brand, escapeCSV(p.name), p.status, ...p.photos].join(',') + '\n';
  }
  
  const blob = new Blob([csv], { type: 'text/csv' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'products-images.csv';
  a.click();
  URL.revokeObjectURL(url);
}

function exportJSON() {
  // Export only changed products as JSON for easier import
  const changed = products.filter(p => p.photos[0]);
  const data = changed.map(p => ({
    id: p.id,
    img: p.photos[0],
    gallery: p.photos.slice(1).filter(u => u)
  }));
  
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'image-updates.json';
  a.click();
  URL.revokeObjectURL(url);
}

// Init — load CSV via file input or from embedded data
function init() {
  // Try to load from localStorage first
  const saved = localStorage.getItem('aura_image_tool_data');
  if (saved) {
    try {
      products = JSON.parse(saved);
      populateBrands();
      renderList();
      return;
    } catch(e) {}
  }
  
  // Show file picker
  const editor = document.getElementById('editor');
  editor.innerHTML = `
    <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:20px;">
      <h2 style="color:#c9a55a;">Загрузи products-images.csv</h2>
      <p style="color:#888;">Перетащи файл сюда или нажми кнопку</p>
      <input type="file" id="csv-input" accept=".csv" style="display:none">
      <button class="btn btn-next" onclick="document.getElementById('csv-input').click()" style="padding:16px 32px;font-size:16px;border:none;border-radius:8px;cursor:pointer;">📂 Открыть CSV</button>
      <p style="color:#555;font-size:12px;">Файл: products-images.csv из папки сайта</p>
    </div>
  `;
  
  document.getElementById('csv-input').addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      products = parseCSV(ev.target.result);
      localStorage.setItem('aura_image_tool_data', JSON.stringify(products));
      populateBrands();
      renderList();
      // Auto-select first product needing photo
      const firstNeed = products.findIndex(p => p.status === 'НУЖНО ФОТО');
      if (firstNeed >= 0) selectProduct(firstNeed);
    };
    reader.readAsText(file);
  });
}

function populateBrands() {
  const select = document.getElementById('filter-brand');
  select.innerHTML = '<option value="">Все бренды</option>' + 
    getBrands().map(b => `<option value="${b}">${b} (${products.filter(p=>p.brand===b).length})</option>`).join('');
}

// Auto-save to localStorage periodically
setInterval(() => {
  if (products.length) {
    localStorage.setItem('aura_image_tool_data', JSON.stringify(products));
  }
}, 5000);

// Filter handlers
document.getElementById('filter-brand').addEventListener('change', renderList);
document.getElementById('filter-search').addEventListener('input', renderList);

// Keyboard shortcuts
document.addEventListener('keydown', (e) => {
  if (e.target.tagName === 'INPUT') return;
  if (e.key === 'ArrowRight' || e.key === 'n') navigate(1);
  if (e.key === 'ArrowLeft' || e.key === 'p') navigate(-1);
});

init();
</script>
</body>
</html>
